<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>📘 Playbook | Topping Tech</title>
<style>
:root {
  --glass: rgba(255,255,255,.55);
  --glass-border: rgba(255,255,255,.65);
  --ink: #0c1a2e;
  --muted: #5c6b80;
  --blue: #0f4c81;
  --blur: blur(24px);
  --font: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  color: var(--ink);
  min-height: 100vh;
  background: #e8eef5;
  background-image:
    radial-gradient(ellipse 70% 50% at 20% 0%, rgba(30,136,229,.15), transparent),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(255,152,0,.1), transparent);
  background-attachment: fixed;
}
a { color: inherit; text-decoration: none; }

.topnav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: rgba(255,255,255,.45);
  backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--blue); font-size: 14px; }
.brand img { width: 32px; height: 32px; border-radius: 8px; }
.nav-home {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 999px;
  background: rgba(255,255,255,.72); backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  font-size: 13px; font-weight: 600; color: var(--blue);
  box-shadow: 0 4px 16px rgba(15,76,129,.08);
  transition: transform .15s;
}
.nav-home:hover { transform: scale(1.03); }

.page { max-width: 720px; margin: 0 auto; padding: 32px 20px 48px; }

.hero {
  text-align: center;
  padding: 36px 28px;
  border-radius: 24px;
  background: var(--glass);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(15,76,129,.08);
  margin-bottom: 20px;
}
.hero .big { font-size: 48px; margin-bottom: 8px; }
.hero h1 { font-size: 26px; margin-bottom: 6px; }
.hero p { color: var(--muted); font-size: 14px; }

.list { display: flex; flex-direction: column; gap: 12px; }
.item {
  display: flex; justify-content: space-between; align-items: center; gap: 16px;
  padding: 20px 22px;
  border-radius: 18px;
  background: var(--glass);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 20px rgba(15,76,129,.06);
  transition: transform .15s;
}
.item:hover { transform: translateY(-2px); }
.item-emoji { font-size: 28px; flex-shrink: 0; }
.item-body h2 { font-size: 16px; margin-bottom: 4px; }
.item-body p { font-size: 12px; color: var(--muted); }
.item-left { display: flex; align-items: center; gap: 14px; }
.btn {
  padding: 10px 18px; border-radius: 11px;
  background: rgba(15,76,129,.88); color: #fff;
  font-size: 13px; font-weight: 700; white-space: nowrap;
  transition: background .15s;
}
.btn:hover { background: #0d3d66; }
</style>
</head>
<body>

<nav class="topnav">
  <a class="brand" href="../index.html">
    <img src="../topping_poster_v2.svg" alt="" />
    <span>📘 Playbook</span>
  </a>
  <a class="nav-home" href="../index.html">🏠 Back to Home</a>
</nav>

<div class="page">
  <header class="hero">
    <div class="big">📘</div>
    <h1>Playbook</h1>
    <p>Product roadmap · marketing and lead generation strategy</p>
  </header>

  <div class="list">
    <article class="item">
      <div class="item-left">
        <span class="item-emoji">🗺️</span>
        <div class="item-body">
          <h2>VELOXA Founder Bible & Roadmap</h2>
          <p>🇬🇧 VELOXA PRD and strategic roadmap</p>
        </div>
      </div>
      <a class="btn" href="roadmap-en.html" target="_blank">🔗 Open</a>
    </article>

    <article class="item">
      <div class="item-left">
        <span class="item-emoji">🎯</span>
        <div class="item-body">
          <h2>Lead Generation Strategy</h2>
          <p>🇬🇧 B2B lead generation and marketing</p>
        </div>
      </div>
      <a class="btn" href="strategic-marketing-en.html" target="_blank">🔗 Open</a>
    </article>
  </div>
</div>

<script src="../assets/i18n-pairs.js"></script>
<script src="../assets/tc-nav.js"></script>
</body>
</html>
