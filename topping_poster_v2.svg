  <text x="48" y="926" font-size="11" fill="#888" font-family="'Vazirmatn', Arial, sans-serif">2026 / 06 / 17</text>
  <text x="397" y="926" font-size="11" fill="#1B4332" font-family="'Vazirmatn', Arial, sans-serif" font-weight="700" text-anchor="middle">۶ ماه — ۲۵ کلاینت</text>
  <text x="746" y="926" font-size="11" fill="#888" font-family="'Vazirmatn', Arial, sans-serif" text-anchor="end">2027 / 06 / 17</text>

