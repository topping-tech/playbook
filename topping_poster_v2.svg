  <text x="48" y="1008" font-size="11" font-weight="300" fill="#74C69D" font-family="'Vazirmatn', Arial, sans-serif" letter-spacing="3">خلاصه اجرایی</text>

  <text x="48" y="1048" font-size="15" font-weight="700" fill="#FFFFFF" font-family="'Vazirmatn', Arial, sans-serif">هفتگی: ۵۰ لید → CRM</text>
  <text x="48" y="1074" font-size="15" font-weight="400" fill="#74C69D" font-family="'Vazirmatn', Arial, sans-serif">ماهانه: ۴ جلسه · ۵ مشتری جدید · نرخ تبدیل ۱۵٪ تا ۲۵٪</text>

